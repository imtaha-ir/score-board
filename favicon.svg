<svg xmlns="http://www.w3.org/2000/svg"
     width="512"
     height="512"
     viewBox="0 0 512 512">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect
      x="16"
      y="16"
      width="480"
      height="480"
      rx="96"
      fill="url(#bg)"/>

  <!-- Scoreboard body -->
  <rect
      x="82"
      y="120"
      width="348"
      height="250"
      rx="32"
      fill="#111827"/>

  <!-- Divider -->
  <rect
      x="252"
      y="145"
      width="8"
      height="200"
      rx="4"
      fill="#334155"/>

  <!-- Left score -->
  <text
      x="170"
      y="290"
      text-anchor="middle"
      font-family="Inter, Arial, sans-serif"
      font-size="128"
      font-weight="800"
      fill="#22D3EE">
      3
  </text>

  <!-- Right score -->
  <text
      x="342"
      y="290"
      text-anchor="middle"
      font-family="Inter, Arial, sans-serif"
      font-size="128"
      font-weight="800"
      fill="#F8FAFC">
      7
  </text>

  <!-- Top lights -->
  <circle cx="122" cy="95" r="10" fill="#22C55E"/>
  <circle cx="150" cy="95" r="10" fill="#EAB308"/>
  <circle cx="178" cy="95" r="10" fill="#EF4444"/>

  <!-- React-inspired orbit -->
  <g transform="translate(256 398)">
    <ellipse
        rx="72"
        ry="24"
        fill="none"
        stroke="url(#accent)"
        stroke-width="10"/>
    <ellipse
        rx="72"
        ry="24"
        transform="rotate(60)"
        fill="none"
        stroke="url(#accent)"
        stroke-width="10"/>
    <ellipse
        rx="72"
        ry="24"
        transform="rotate(-60)"
        fill="none"
        stroke="url(#accent)"
        stroke-width="10"/>

    <circle r="12" fill="#22D3EE"/>
  </g>

</svg>