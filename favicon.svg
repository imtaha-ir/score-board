<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Outer circle background -->
  <circle cx="256" cy="256" r="240" fill="#e0d24e"/>
  <circle cx="256" cy="256" r="220" fill="#1e2937"/>

  <!-- Blue rectangle (left) -->
  <rect 
    x="50" y="64" 
    width="300" height="160" 
    rx="24" ry="24" 
    fill="#3b82f6" 
    stroke="#1e40af" 
    stroke-width="18"/>

  <!-- Red rectangle (right, slightly overlapping) -->
  <rect 
    x="150" y="288" 
    width="300" height="156" 
    rx="24" ry="24" 
    fill="#ef4444" 
    stroke="#991b1b" 
    stroke-width="18"/>

  <!-- Score on Blue: 0 (perfectly centered) -->
  <text 
    x="190" y="155" 
    font-family="Arial Black, sans-serif" 
    font-size="88" 
    font-weight="900" 
    fill="#ffffff" 
    text-anchor="middle" 
    dominant-baseline="middle">0</text>

  <!-- Score on Red: 1 (perfectly centered) -->
  <text 
    x="300" y="380" 
    font-family="Arial Black, sans-serif" 
    font-size="88" 
    font-weight="900" 
    fill="#ffffff" 
    text-anchor="middle" 
    dominant-baseline="middle">1</text>


</svg>