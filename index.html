<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/score-board/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Score Board</title>
    
    <!-- PWA manifest: controls installability and orientation -->
    <link rel="manifest" href="/score-board/assets/manifest-iGXWH61X.webmanifest">

    <!-- Theme & Status Bar -->
    <meta name="theme-color" content="#0f172a">
    <meta name="color-scheme" content="dark">

    <!-- iOS/Apple support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ScoreBoard">
    <link rel="apple-touch-icon" href="/score-board/favicon.svg">

    <!-- PWA Standalone Orientation Lock -->
    <meta name="screen-orientation" content="portrait-primary">

    <!-- Fullscreen support -->
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Game-style & modern fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/score-board/assets/index-rxoIoBTt.js"></script>
    <link rel="stylesheet" crossorigin href="/score-board/assets/index-tu-dJnwd.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
